---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: k8s-monitoring
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    chart: k8s-monitoring
    repoURL: https://grafana.github.io/helm-charts
    targetRevision: 4.0.1
    helm:
      valuesObject:
        cluster:
          name: k8s-01
        collectors:
          alloy-singleton:
            presets: [singleton]
            alloy:
              stabilityLevel: experimental
            extraConfig: |-
              mimir.rules.kubernetes "default" {
                address = "http://mimir-ruler.monitoring.svc:8080"
                tenant_id = "anonymous"
              }
          alloy-logs:
            presets: [filesystem-log-reader, daemonset]
          alloy-metrics:
            presets: [statefulset]
          alloy-profiles:
            presets: [daemonset, privileged]
        destinations:
          logs:
            type: loki
            url: http://loki-headless.monitoring.svc.cluster.local:3100/loki/api/v1/push
          metrics:
            type: prometheus
            url: http://mimir-gateway.monitoring.svc.cluster.local:80/api/v1/push
          profiles:
            type: pyroscope
            url: http://pyroscope-headless.monitoring.svc.cluster.local:4040
        clusterMetrics:
          enabled: true
          collector: alloy-metrics
        telemetryServices:
          node-exporter:
            deploy: true
          kube-state-metrics:
            deploy: true
        prometheusOperatorObjects:
          enabled: true
          collector: alloy-singleton
        clusterEvents:
          enabled: true
          collector: alloy-singleton
        podLogsViaLoki:
          enabled: true
          collector: alloy-logs
        profiling:
          enabled: true
          collector: alloy-profiles
  destination:
    name: in-cluster
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
