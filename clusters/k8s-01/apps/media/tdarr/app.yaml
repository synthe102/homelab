---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tdarr
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    name: in-cluster
    namespace: media
  project: default
  sources:
    - chart: app-template
      repoURL: https://bjw-s-labs.github.io/helm-charts
      targetRevision: 5.0.1
      helm:
        valuesObject:
          controllers:
            server:
              pod:
                securityContext:
                  fsGroup: 568
                  fsGroupChangePolicy: OnRootMismatch
              containers:
                main:
                  nameOverride: tdarr-server
                  image:
                    repository: ghcr.io/haveagitgat/tdarr
                    # renovate: datasource=docker depName=ghcr.io/haveagitgat/tdarr
                    tag: 2.74.01
                  env:
                    TZ: "Europe/Paris"
                    UMASK_SET: "022"
                    PUID: "568"
                    PGID: "568"
                    serverIP: 0.0.0.0
                    serverPort: "8266"
                    webUIPort: "8265"
                    internalNode: "false"
            node:
              pod:
                securityContext:
                  fsGroup: 568
                  fsGroupChangePolicy: OnRootMismatch
              containers:
                main:
                  nameOverride: tdarr-node
                  image:
                    repository: ghcr.io/haveagitgat/tdarr_node
                    # renovate: datasource=docker depName=ghcr.io/haveagitgat/tdarr_node
                    tag: 2.74.01
                  env:
                    TZ: "Europe/Paris"
                    UMASK_SET: "022"
                    PUID: "568"
                    PGID: "568"
                    nodeName: k8s-01
                    serverIP: tdarr.media.svc.cluster.local
                    serverPort: "8266"
                    inContainer: "true"
                  resources:
                    requests:
                      gpu.intel.com/i915: 1
                    limits:
                      gpu.intel.com/i915: 1
          service:
            server:
              controller: server
              ports:
                http:
                  port: 8265
                api:
                  port: 8266
          persistence:
            server-data:
              enabled: true
              type: persistentVolumeClaim
              accessMode: ReadWriteOnce
              size: 5Gi
              advancedMounts:
                server:
                  main:
                    - path: /app/server
            server-configs:
              enabled: true
              type: persistentVolumeClaim
              accessMode: ReadWriteOnce
              size: 1Gi
              advancedMounts:
                server:
                  main:
                    - path: /app/configs
            server-logs:
              enabled: true
              type: persistentVolumeClaim
              accessMode: ReadWriteOnce
              size: 1Gi
              advancedMounts:
                server:
                  main:
                    - path: /app/logs
            node-configs:
              enabled: true
              type: persistentVolumeClaim
              accessMode: ReadWriteOnce
              size: 1Gi
              advancedMounts:
                node:
                  main:
                    - path: /app/configs
            node-logs:
              enabled: true
              type: persistentVolumeClaim
              accessMode: ReadWriteOnce
              size: 1Gi
              advancedMounts:
                node:
                  main:
                    - path: /app/logs
            transcode-cache:
              type: emptyDir
              advancedMounts:
                node:
                  main:
                    - path: /temp
            media:
              type: nfs
              server: 192.168.1.252
              path: /mnt/MainHDD/Media
              advancedMounts:
                node:
                  main:
                    - path: /media
          route:
            app:
              hostnames:
                - tdarr.suslian.engineer
              parentRefs:
                - name: internal
                  namespace: kube-system
                  sectionName: https
              rules:
                - backendRefs:
                    - identifier: server
                      port: 8265
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
